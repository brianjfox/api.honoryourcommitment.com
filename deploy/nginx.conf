# Nginx reverse proxy for the API.
# Place in /etc/nginx/sites-available/ and symlink into sites-enabled.
# Obtain TLS certs with: certbot --nginx -d api.honoryourcommitment.com
#
# The API itself listens only on 127.0.0.1:3000 — it is never exposed
# to the internet directly; all traffic arrives through this proxy.

server {
    listen 80;
    listen [::]:80;
    server_name api.honoryourcommitment.com;

    # Let certbot manage the redirect to HTTPS after issuing certs.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.honoryourcommitment.com;

    # ssl_certificate / ssl_certificate_key are added by certbot.

    # Security headers (Helmet also sets app-level headers).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 128k;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
